services:
  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cache:
    image: redis:alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 50mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  metricas:
    build: ./metricas
    ports:
      - "8001:8000"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:9092

  generador_respuestas:
    build: ./generador_respuestas
    ports:
      - "8002:8000"

  cache_system:
    build: ./cache_system
    ports:
      - "8003:8000"
    depends_on:
      redis-cache:
        condition: service_healthy
      generador_respuestas:
        condition: service_started
      metricas:
        condition: service_started
    environment:
      - REDIS_HOST=redis-cache
      - RESPUESTAS_URL=http://generador_respuestas:8000
      - METRICAS_URL=http://metricas:8000

  generador_trafico:
    build: ./generador_trafico
    depends_on:
      - cache_system
      - kafka
    environment:
      - CACHE_URL=http://cache_system:8000
      - KAFKA_BROKER=kafka:9092
      - DISTRIBUCION=zipf
      - TOTAL_CONSULTAS=6000
      - SLEEP_ENTRE_CONSULTAS=0.01
      - CONFIDENCE_VARIATION=random

  consumidor_kafka:
    build: ./consumidor_kafka
    depends_on:
      - kafka
      - cache_system
    environment:
      - KAFKA_BROKER=kafka:9092
      - CACHE_URL=http://cache_system:8000

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch

  spark_procesamiento:
    build: ./spark_streaming
    depends_on:
      - kafka
      - elasticsearch
